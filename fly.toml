# fly.toml app configuration file generated for brix on 2026-03-15T11:20:21Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'brix'
primary_region = 'ams'

[build]

[env]
  PORT = '8080'
  HOST = '0.0.0.0'
  BRIX_DOMAIN = 'brix.brostr.app'
  DB_PATH = '/data/brix.db'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[mounts]
  source = 'brix_data'
  destination = '/data'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
